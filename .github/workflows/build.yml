name: Build Smartcut (MSYS2)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v7

    - name: Run Build Script
      run: .\build.bat
      
    - name: Package Release
      run: Compress-Archive -Path dist\smartcut.exe -DestinationPath smartcut-windows-x64.zip
        
    - name: Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: smartcut-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
